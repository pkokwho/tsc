<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6366f1"/>
      <stop offset="1" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="#818cf8"/>
      <stop offset="1" stop-color="#c084fc"/>
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Subtle grid pattern -->
  <g opacity="0.08" stroke="#fff" stroke-width="1">
    <line x1="0" y1="128" x2="512" y2="128"/>
    <line x1="0" y1="256" x2="512" y2="256"/>
    <line x1="0" y1="384" x2="512" y2="384"/>
    <line x1="128" y1="0" x2="128" y2="512"/>
    <line x1="256" y1="0" x2="256" y2="512"/>
    <line x1="384" y1="0" x2="384" y2="512"/>
  </g>
  <!-- Hexagon (workbench symbol) -->
  <g filter="url(#shadow)">
    <path d="M256 96 L384 168 L384 312 L256 384 L128 312 L128 168 Z" fill="none" stroke="url(#glow)" stroke-width="10" stroke-linejoin="round"/>
  </g>
  <!-- Inner accent -->
  <path d="M256 96 L384 168 L384 312 L256 384 L128 312 L128 168 Z" fill="url(#glow)" opacity="0.15"/>
  <!-- Center node -->
  <circle cx="256" cy="168" r="20" fill="url(#glow)"/>
  <circle cx="256" cy="168" r="32" fill="none" stroke="url(#glow)" stroke-width="2" opacity="0.5"/>
  <!-- Connection lines -->
  <g stroke="url(#glow)" stroke-width="3" opacity="0.6">
    <line x1="256" y1="188" x2="256" y2="240"/>
    <line x1="256" y1="240" x2="200" y2="280"/>
    <line x1="256" y1="240" x2="312" y2="280"/>
  </g>
  <!-- Bottom nodes -->
  <circle cx="200" cy="280" r="10" fill="url(#glow)"/>
  <circle cx="312" cy="280" r="10" fill="url(#glow)"/>
  <!-- Sparkle (AI symbol) -->
  <g transform="translate(336, 336)" opacity="0.9">
    <path d="M0 -16 L4 -4 L16 0 L4 4 L0 16 L-4 4 L-16 0 L-4 -4 Z" fill="#fff"/>
  </g>
</svg>
