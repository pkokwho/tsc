<style>
  /* ==================== CSS Variables - Dark Theme (Default) ==================== */
  :root {
    --bg-primary: #0a0a0f;
    --bg-secondary: rgba(255,255,255,0.04);
    --bg-card: rgba(255,255,255,0.06);
    --bg-card-hover: rgba(255,255,255,0.09);
    --bg-nav: rgba(10,10,15,0.7);
    --border-color: rgba(255,255,255,0.08);
    --border-active: rgba(99,102,241,0.5);
    --text-primary: rgba(255,255,255,0.95);
    --text-secondary: rgba(255,255,255,0.55);
    --text-tertiary: rgba(255,255,255,0.35);
    --text-gradient-from: #fff;
    --text-gradient-to: rgba(255,255,255,0.7);
    --accent-1: #6366f1;
    --accent-2: #a855f7;
    --accent-gradient: linear-gradient(135deg, #6366f1, #a855f7);
    --accent-glow: rgba(99,102,241,0.4);
    --radius-sm: 12px;
    --radius-md: 16px;
    --radius-lg: 24px;
    --radius-xl: 32px;
    --shadow-card: 0 4px 24px rgba(0,0,0,0.3);
    --shadow-glow: 0 0 40px rgba(99,102,241,0.15);
    --font-stack: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', 'PingFang SC', 'Noto Sans CJK SC', sans-serif;
    --transition-fast: 0.2s cubic-bezier(0.4,0,0.2,1);
    --transition-medium: 0.4s cubic-bezier(0.4,0,0.2,1);
    --transition-slow: 0.6s cubic-bezier(0.4,0,0.2,1);
    --select-bg: #1a1a2e;
    --select-arrow: rgba(255,255,255,0.4);
    --input-bg: rgba(255,255,255,0.04);
    --input-focus-bg: rgba(255,255,255,0.06);
    --copy-bg: rgba(255,255,255,0.06);
    --copy-hover-bg: rgba(255,255,255,0.1);
    --copy-border: rgba(255,255,255,0.15);
    --orb-opacity: 0.12;
    --grid-line: rgba(255,255,255,0.02);
  }

  /* ==================== CSS Variables - Light Theme ==================== */
  [data-theme="light"] {
    --bg-primary: #f5f5f7;
    --bg-secondary: rgba(0,0,0,0.03);
    --bg-card: rgba(255,255,255,0.8);
    --bg-card-hover: rgba(255,255,255,0.95);
    --bg-nav: rgba(245,245,247,0.75);
    --border-color: rgba(0,0,0,0.08);
    --border-active: rgba(99,102,241,0.4);
    --text-primary: rgba(0,0,0,0.88);
    --text-secondary: rgba(0,0,0,0.55);
    --text-tertiary: rgba(0,0,0,0.35);
    --text-gradient-from: #1a1a1a;
    --text-gradient-to: rgba(0,0,0,0.6);
    --shadow-card: 0 4px 24px rgba(0,0,0,0.08);
    --shadow-glow: 0 0 40px rgba(99,102,241,0.08);
    --select-bg: #fff;
    --select-arrow: rgba(0,0,0,0.4);
    --input-bg: rgba(0,0,0,0.03);
    --input-focus-bg: rgba(0,0,0,0.05);
    --copy-bg: rgba(0,0,0,0.04);
    --copy-hover-bg: rgba(0,0,0,0.08);
    --copy-border: rgba(0,0,0,0.12);
    --orb-opacity: 0.06;
    --grid-line: rgba(0,0,0,0.03);
  }

  /* ==================== Reset & Base ==================== */
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
  body {
    font-family: var(--font-stack);
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
    line-height: 1.6;
    transition: background var(--transition-medium), color var(--transition-medium);
  }

  /* ==================== Background Effects ==================== */
  .bg-effects {
    position: fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden;
  }
  .bg-orb {
    position: absolute; border-radius: 50%; filter: blur(120px); opacity: var(--orb-opacity);
    animation: orbFloat 20s ease-in-out infinite alternate;
    transition: opacity var(--transition-medium);
  }
  .bg-orb-1 { width:600px; height:600px; background:#6366f1; top:-200px; left:-100px; }
  .bg-orb-2 { width:500px; height:500px; background:#a855f7; bottom:-150px; right:-100px; animation-delay:-10s; }
  .bg-orb-3 { width:300px; height:300px; background:#06b6d4; top:50%; left:50%; transform:translate(-50%,-50%); animation-delay:-5s; }
  .bg-grid {
    position: absolute; inset:0;
    background-image:
      linear-gradient(var(--grid-line) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
    background-size: 60px 60px;
    transition: background-image var(--transition-medium);
  }
  @keyframes orbFloat {
    0% { transform: translate(0,0) scale(1); }
    50% { transform: translate(50px,-30px) scale(1.1); }
    100% { transform: translate(-30px,50px) scale(0.95); }
  }

  /* ==================== Layout ==================== */
  .container { position: relative; z-index:1; max-width:1200px; margin:0 auto; padding: 0 24px; }

  /* ==================== Navigation ==================== */
  nav {
    position: sticky; top:0; z-index:100;
    background: var(--bg-nav);
    backdrop-filter: saturate(180%) blur(20px);
    -webkit-backdrop-filter: saturate(180%) blur(20px);
    border-bottom: 1px solid var(--border-color);
    transition: background var(--transition-medium), border-color var(--transition-medium);
  }
  .nav-inner {
    display:flex; align-items:center; justify-content:space-between;
    max-width:1200px; margin:0 auto; padding:16px 24px;
  }
  .nav-brand {
    display:flex; align-items:center; gap:12px;
    font-size:18px; font-weight:600; letter-spacing:-0.02em;
    background: var(--accent-gradient); -webkit-background-clip:text;
    -webkit-text-fill-color:transparent; background-clip:text;
  }
  .nav-brand svg { flex-shrink:0; }

  /* 导航右侧操作按钮组 */
  .nav-actions {
    display:flex; align-items:center; gap:8px;
  }
  .nav-btn {
    display:flex; align-items:center; justify-content:center;
    width:40px; height:40px;
    background: var(--bg-card);
    border:1px solid var(--border-color);
    border-radius: var(--radius-sm);
    color: var(--text-secondary);
    cursor:pointer; transition: all var(--transition-fast);
    font-size:14px; font-weight:600; font-family:var(--font-stack);
  }
  .nav-btn:hover {
    background: var(--bg-card-hover);
    color: var(--text-primary);
    border-color: var(--border-active);
  }

  /* ==================== Hero Section ==================== */
  .hero {
    text-align:center; padding:80px 24px 48px;
    animation: fadeUp 0.8s ease-out both;
  }
  .hero-badge {
    display:inline-flex; align-items:center; gap:6px;
    padding:6px 16px; border-radius:100px;
    background: rgba(99,102,241,0.1); border:1px solid rgba(99,102,241,0.2);
    font-size:13px; color:var(--accent-1); margin-bottom:24px;
  }
  .hero-badge-dot {
    width:6px; height:6px; border-radius:50%; background:var(--accent-1);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }
  .hero h1 {
    font-size: clamp(36px, 6vw, 64px);
    font-weight:700; letter-spacing:-0.03em;
    line-height:1.1; margin-bottom:16px;
    background: linear-gradient(135deg, var(--text-gradient-from) 0%, var(--text-gradient-to) 100%);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    transition: background var(--transition-medium);
  }
  .hero p {
    font-size: clamp(16px, 2vw, 20px);
    color: var(--text-secondary); max-width:600px; margin:0 auto;
    line-height:1.6;
  }

  /* ==================== Input Section ==================== */
  .input-section {
    animation: fadeUp 0.8s ease-out 0.2s both;
    margin-bottom:48px;
  }
  .input-card {
    background: var(--bg-card);
    border:1px solid var(--border-color);
    border-radius: var(--radius-lg);
    padding:32px;
    backdrop-filter: blur(20px);
    box-shadow: var(--shadow-card);
    transition: border-color var(--transition-fast), box-shadow var(--transition-fast), background var(--transition-medium);
  }
  .input-card:focus-within {
    border-color: var(--border-active);
    box-shadow: var(--shadow-card), var(--shadow-glow);
  }
  .input-label {
    display:block; font-size:14px; font-weight:500;
    color: var(--text-secondary); margin-bottom:12px;
    letter-spacing: 0.02em;
  }
  .input-textarea {
    width:100%; min-height:140px; padding:16px;
    background: var(--input-bg);
    border:1px solid transparent;
    border-radius: var(--radius-md);
    color: var(--text-primary);
    font-family: var(--font-stack);
    font-size: 16px; /* 防止 iOS 缩放 */
    line-height: 1.6;
    resize: vertical;
    transition: all var(--transition-fast);
    outline: none;
  }
  .input-textarea::placeholder { color: var(--text-tertiary); }
  .input-textarea:focus {
    background: var(--input-focus-bg);
    border-color: var(--border-active);
  }

  /* ==================== Controls ==================== */
  .controls {
    display:grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap:16px; margin-top:24px;
  }
  .control-group label {
    display:block; font-size:13px; color:var(--text-secondary);
    margin-bottom:8px; font-weight:500;
  }
  .control-select {
    width:100%; padding:12px 16px;
    background: var(--input-bg);
    border:1px solid var(--border-color);
    border-radius: var(--radius-sm);
    color: var(--text-primary);
    font-family: var(--font-stack);
    font-size:16px; /* 防止 iOS 缩放 */
    outline:none; cursor:pointer;
    appearance:none; -webkit-appearance:none;
    background-image: url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1.5L6 6.5L11 1.5' stroke='rgba(255,255,255,0.4)' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
    background-repeat:no-repeat; background-position: right 16px center;
    transition: all var(--transition-fast);
    min-height:44px; /* 触摸友好最小高度 */
  }
  .control-select:focus {
    border-color: var(--border-active);
    background-color: var(--input-focus-bg);
  }
  .control-select option { background:var(--select-bg); color:var(--text-primary); }

  /* ==================== Generate Button ==================== */
  .btn-generate {
    display:flex; align-items:center; justify-content:center; gap:10px;
    width:100%; margin-top:24px; padding:16px 32px;
    background: var(--accent-gradient);
    border:none; border-radius: var(--radius-md);
    color:#fff; font-family:var(--font-stack);
    font-size:16px; font-weight:600;
    cursor:pointer; position:relative; overflow:hidden;
    transition: all var(--transition-fast);
    box-shadow: 0 4px 20px rgba(99,102,241,0.3);
    min-height:44px; /* 触摸友好 */
  }
  .btn-generate:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(99,102,241,0.4);
  }
  .btn-generate:active { transform: translateY(0); }
  .btn-generate:disabled {
    opacity:0.5; cursor:not-allowed; transform:none;
  }
  .btn-generate .btn-shimmer {
    position:absolute; inset:0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
    transform: translateX(-100%);
    transition: transform 0.6s;
  }
  .btn-generate:hover .btn-shimmer { transform: translateX(100%); }

  /* ==================== Results Section ==================== */
  .results-section {
    padding-bottom:80px;
    animation: fadeUp 0.8s ease-out 0.4s both;
  }
  .results-header {
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:24px;
  }
  .results-title {
    font-size:20px; font-weight:600; letter-spacing:-0.01em;
  }
  .results-count {
    font-size:13px; color:var(--text-tertiary);
    padding:4px 12px; border-radius:100px;
    background:var(--bg-secondary);
  }
  .results-grid {
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
    gap:20px;
  }

  /* ==================== Prompt Card ==================== */
  .prompt-card {
    background: var(--bg-card);
    border:1px solid var(--border-color);
    border-radius: var(--radius-lg);
    overflow:hidden;
    transition: all var(--transition-medium);
    animation: cardIn 0.5s ease-out both;
  }
  .prompt-card:nth-child(1) { animation-delay: 0.05s; }
  .prompt-card:nth-child(2) { animation-delay: 0.15s; }
  .prompt-card:nth-child(3) { animation-delay: 0.25s; }
  .prompt-card:nth-child(4) { animation-delay: 0.35s; }
  .prompt-card:hover {
    background: var(--bg-card-hover);
    border-color: rgba(99,102,241,0.15);
    transform: translateY(-4px);
    box-shadow: var(--shadow-card);
  }
  .card-header {
    display:flex; align-items:center; justify-content:space-between;
    padding:20px 24px 16px;
    border-bottom:1px solid var(--border-color);
  }
  .card-model {
    display:flex; align-items:center; gap:10px;
  }
  .card-model-icon {
    width:36px; height:36px; border-radius:10px;
    display:flex; align-items:center; justify-content:center;
    font-size:16px; font-weight:700; color:#fff;
  }
  .card-model-icon.mj { background: linear-gradient(135deg, #5865f2, #4752c4); }
  .card-model-icon.flux { background: linear-gradient(135deg, #f97316, #ea580c); }
  .card-model-icon.video { background: linear-gradient(135deg, #ec4899, #db2777); }
  .card-model-icon.universal { background: linear-gradient(135deg, #10b981, #059669); }
  .card-model-name { font-size:15px; font-weight:600; }
  .card-model-desc { font-size:12px; color:var(--text-tertiary); }
  .card-body { padding:20px 24px; }
  .card-prompt {
    font-size:14px; line-height:1.7;
    color: var(--text-secondary);
    word-break: break-word;
    white-space: pre-wrap;
    min-height: 100px;
  }
  .card-footer {
    display:flex; gap:8px; padding:16px 24px 20px;
    border-top:1px solid var(--border-color);
  }
  .btn-copy {
    display:flex; align-items:center; justify-content:center; gap:6px;
    flex:1; padding:10px 16px;
    background: var(--copy-bg);
    border:1px solid var(--border-color);
    border-radius: var(--radius-sm);
    color: var(--text-secondary);
    font-family: var(--font-stack);
    font-size:13px; font-weight:500;
    cursor:pointer; transition: all var(--transition-fast);
    min-height:44px; /* 触摸友好 */
  }
  .btn-copy:hover {
    background: var(--copy-hover-bg);
    color: var(--text-primary);
    border-color: var(--copy-border);
  }
  .btn-copy.copied {
    background: rgba(34,197,94,0.15);
    border-color: rgba(34,197,94,0.3);
    color: #22c55e;
  }

  /* ==================== Empty State ==================== */
  .empty-state {
    text-align:center; padding:80px 24px;
    color: var(--text-tertiary);
  }
  .empty-icon {
    width:64px; height:64px; margin:0 auto 16px;
    opacity:0.3;
  }
  .empty-state p { font-size:15px; }

  /* ==================== Toast ==================== */
  .toast-container {
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
    z-index:1000;
  }
  .toast {
    padding:12px 24px; border-radius:100px;
    background: rgba(34,197,94,0.15);
    border:1px solid rgba(34,197,94,0.3);
    color:#22c55e; font-size:14px; font-weight:500;
    backdrop-filter: blur(10px);
    animation: toastIn 0.3s ease-out, toastOut 0.3s ease-in 2s forwards;
    white-space:nowrap;
  }

  /* ==================== Animations ==================== */
  @keyframes fadeUp {
    from { opacity:0; transform:translateY(20px); }
    to { opacity:1; transform:translateY(0); }
  }
  @keyframes cardIn {
    from { opacity:0; transform:translateY(30px) scale(0.95); }
    to { opacity:1; transform:translateY(0) scale(1); }
  }
  @keyframes toastIn {
    from { opacity:0; transform:translateY(10px); }
    to { opacity:1; transform:translateY(0); }
  }
  @keyframes toastOut {
    from { opacity:1; }
    to { opacity:0; transform:translateY(-10px); }
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }
  .spinner {
    width:18px; height:18px;
    border:2px solid rgba(255,255,255,0.2);
    border-top-color:#fff;
    border-radius:50%;
    animation:spin 0.6s linear infinite;
  }

  /* ==================== Responsive ==================== */
  @media (max-width:768px) {
    .hero { padding:48px 16px 32px; }
    .input-card { padding:20px; }
    .controls { grid-template-columns:1fr 1fr; gap:12px; }
    .results-grid { grid-template-columns:1fr; }
    .card-body { padding:16px 20px; }
    .card-header { padding:16px 20px 12px; }
    .card-footer { padding:12px 20px 16px; }
    .container { padding:0 16px; }
    .nav-inner { padding:12px 16px; }
    .nav-brand { font-size:16px; }
  }
  @media (max-width:480px) {
    .controls { grid-template-columns:1fr; }
    .hero h1 { font-size:28px; }
    .hero p { font-size:15px; }
    .nav-btn { width:36px; height:36px; font-size:12px; }
    .nav-actions { gap:6px; }
  }

  /* ==================== Footer ==================== */
  footer {
    text-align:center; padding:40px 24px;
    border-top:1px solid var(--border-color);
    color:var(--text-tertiary); font-size:13px;
    transition: border-color var(--transition-medium);
  }
  footer a {
    color:var(--accent-1); text-decoration:none;
  }
  footer a:hover { text-decoration:underline; }
</style>
</head>

  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>
  <div class="bg-orb bg-orb-3"></div>
  <div class="bg-grid"></div>
</div>

<!-- ==================== Navigation ==================== -->
<nav>
  <div class="nav-inner">
    <div class="nav-brand">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none">

      </svg>
      TSC AI Prompt Studio

          <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>

/* ==================== 语言检测与状态管理 ==================== */

/* 自动检测浏览器语言，优先使用存储的偏好 */
let currentLang = localStorage.getItem('tsc-lang') ||
  (navigator.language.startsWith('zh') ? 'zh' : 'en');

/* 当前主题，默认深色 */
let currentTheme = localStorage.getItem('tsc-theme') || 'dark';

/* ==================== 语言切换功能 ==================== */
function toggleLang() {
  currentLang = currentLang === 'zh' ? 'en' : 'zh';
  localStorage.setItem('tsc-lang', currentLang);
  applyLocale();
}

/* 应用当前语言到页面所有文本 */
function applyLocale() {
  const t = LOCALES[currentLang];

  /* 更新 html lang 属性 */
  document.documentElement.lang = currentLang === 'zh' ? 'zh-CN' : 'en';

  /* 更新语言切换按钮文字 */
  document.getElementById('langBtn').textContent = t.langBtn;

  /* 更新 data-i18n 文本 */
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (t[key] !== undefined) el.textContent = t[key];
  });

  /* 更新 data-i18n-html（含 HTML 标签的文本） */
  document.querySelectorAll('[data-i18n-html]').forEach(el => {
    const key = el.getAttribute('data-i18n-html');
    if (t[key] !== undefined) el.innerHTML = t[key];
  });

  /* 更新 placeholder */
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
    const key = el.getAttribute('data-i18n-placeholder');
    if (t[key] !== undefined) el.placeholder = t[key];
  });

  /* 更新 select 选项 */
  populateSelect('aspectRatio', t.aspectOptions, '16:9');
  populateSelect('style', t.styleOptions, '写实摄影');
  populateSelect('quality', t.qualityOptions, '2');
  populateSelect('stylize', t.stylizeOptions, '250');
}

/* 填充 select 下拉选项 */
function populateSelect(id, options, defaultVal) {
  const sel = document.getElementById(id);
  const currentVal = sel.value || defaultVal;
  sel.innerHTML = options.map(o =>
    `<option value="${o.value}"${o.value === currentVal ? ' selected' : ''}>${o.text}</option>`
  ).join('');
}

/* ==================== 主题切换功能 ==================== */
function toggleTheme() {
  currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
  localStorage.setItem('tsc-theme', currentTheme);
  applyTheme();
}

/* 应用主题到页面 */
function applyTheme() {
  document.documentElement.setAttribute('data-theme', currentTheme);

  /* 更新主题图标：深色显示太阳，浅色显示月亮 */
  const icon = document.getElementById('themeIcon');
  if (currentTheme === 'dark') {
    icon.innerHTML = '<circle cx="12" cy="12" r="5" stroke="currentColor" stroke-width="2"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>';
  } else {
    icon.innerHTML = '<path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>';
  }
}

/* ==================== 风格映射表 ==================== */
const STYLE_MAP = {
  '写实摄影': { mj: 'photorealistic, ultra detailed photography', flux: 'photorealistic, professional photography', video: 'photorealistic, cinematic', universal: 'photorealistic, professional photography, ultra detailed, sharp focus' },
  '赛博朋克': { mj: 'cyberpunk, neon lights, futuristic city', flux: 'cyberpunk aesthetic, neon lighting, futuristic', video: 'cyberpunk, neon glow, futuristic atmosphere', universal: 'cyberpunk style, neon lights, futuristic cityscape, glowing elements' },
  '动漫风格': { mj: 'anime style, cel shading, vibrant colors', flux: 'anime style, cel shaded, vibrant colors', video: 'anime style animation, cel shading', universal: 'anime art style, cel shading, vibrant colors, detailed illustration' },
  '油画质感': { mj: 'oil painting style, rich textures, canvas', flux: 'oil painting style, thick brushstrokes, rich texture', video: 'oil painting animation, rich texture', universal: 'oil painting style, thick impasto brushstrokes, rich color palette, canvas texture' },
  '水彩手绘': { mj: 'watercolor painting, soft edges, artistic', flux: 'watercolor style, soft washes, artistic', video: 'watercolor animation style, soft fluid motion', universal: 'watercolor painting style, soft washes, fluid edges, artistic' },
  '极简主义': { mj: 'minimalist design, clean lines, negative space', flux: 'minimalist composition, clean and simple', video: 'minimalist aesthetic, clean motion', universal: 'minimalist composition, clean lines, generous negative space, simple forms' },
  '科幻未来': { mj: 'sci-fi futuristic, advanced technology, space', flux: 'sci-fi futuristic, advanced technology', video: 'sci-fi cinematic, futuristic atmosphere', universal: 'sci-fi futuristic, advanced technology, space exploration, sleek design' },
  '奇幻魔法': { mj: 'fantasy magical, ethereal, enchanted', flux: 'fantasy magical world, ethereal glow', video: 'fantasy cinematic, magical atmosphere', universal: 'fantasy magical world, ethereal glow, enchanted atmosphere, mystical elements' },
  '暗黑哥特': { mj: 'dark gothic, moody atmosphere, dramatic shadows', flux: 'dark gothic style, dramatic lighting', video: 'dark gothic cinematic, moody atmosphere', universal: 'dark gothic style, dramatic lighting, moody atmosphere, ornate details' },
  '复古胶片': { mj: 'vintage film photography, film grain, retro', flux: 'vintage film aesthetic, retro style, film grain', video: 'vintage film look, retro cinematic', universal: 'vintage film photography aesthetic, film grain, retro color grading, nostalgic mood' },
  '3D渲染': { mj: '3D render, octane render, ray tracing', flux: '3D rendered, octane render, photorealistic 3D', video: '3D animation, octane render style', universal: '3D rendered, octane render, ray tracing, photorealistic 3D, studio lighting' },
  '像素艺术': { mj: 'pixel art, 16-bit style, retro gaming', flux: 'pixel art style, retro game aesthetic', video: 'pixel art animation, retro style', universal: 'pixel art style, 16-bit retro gaming aesthetic, crisp pixel details' }
};

/* 质量映射表 */
const QUALITY_MAP = { '1': '', '2': 'masterpiece, best quality', '3': 'masterpiece, best quality, ultra detailed, 8K UHD' };

/* ==================== Prompt 生成函数 ==================== */

/* 生成 Midjourney 格式 Prompt */
function generateMidjourneyPrompt(desc, style, aspect, quality, stylize) {
  const s = STYLE_MAP[style] || STYLE_MAP['写实摄影'];
  const q = QUALITY_MAP[quality];
  let prompt = desc;
  if (q) prompt = q + ', ' + prompt;
  prompt += ', ' + s.mj;
  prompt += ' --v 6.0 --ar ' + aspect + ' --q 2 --style raw --s ' + stylize;
  return prompt;
}

/* 生成 Flux 格式 Prompt */
function generateFluxPrompt(desc, style) {
  const s = STYLE_MAP[style] || STYLE_MAP['写实摄影'];
  return desc + ', ' + s.flux + ', ultra detailed, professional quality, sharp focus, cinematic composition';
}

/* 生成视频格式 Prompt */
function generateVideoPrompt(desc, style) {
  const s = STYLE_MAP[style] || STYLE_MAP['写实摄影'];
  return desc + ', ' + s.video + ', smooth cinematic motion, dynamic camera movement, 4K quality, professional lighting, film grain, slow motion';
}

/* 生成通用格式 Prompt（适配所有生图模型） */
function generateUniversalPrompt(desc, style) {
  const s = STYLE_MAP[style] || STYLE_MAP['写实摄影'];
  return desc + ', ' + s.universal + ', high quality, best quality, masterpiece, ultra detailed, professional composition, cinematic lighting';
}

/* ==================== 核心逻辑：生成提示词 ==================== */
function generatePrompts() {
  const desc = document.getElementById('description').value.trim();
  const t = LOCALES[currentLang];

  /* 校验：描述不能为空 */
  if (!desc) {
    document.getElementById('description').focus();
    showToast(t.toastEmpty, 'warning');
    return;
  }

  /* 获取参数 */
  const style = document.getElementById('style').value;
  const aspect = document.getElementById('aspectRatio').value;
  const quality = document.getElementById('quality').value;
  const stylize = document.getElementById('stylize').value;
  const btn = document.getElementById('generateBtn');
  const btnText = document.getElementById('btnText');

  /* 设置加载状态 */
  btn.disabled = true;
  btnText.innerHTML = t.generating;

  /* 模拟生成延迟（实际为本地计算） */
  setTimeout(() => {
    /* 生成四种格式的 Prompt */
    const mjPrompt = generateMidjourneyPrompt(desc, style, aspect, quality, stylize);
    const fluxPrompt = generateFluxPrompt(desc, style);
    const videoPrompt = generateVideoPrompt(desc, style);
    const universalPrompt = generateUniversalPrompt(desc, style);

    /* 渲染结果卡片 */
    renderResults([
      { model: currentLang === 'zh' ? '通用模型' : 'Universal', icon: 'ALL', iconClass: 'universal', desc: t.modelUniversal, prompt: universalPrompt },
      { model: 'Midjourney', icon: 'MJ', iconClass: 'mj', desc: t.modelMj, prompt: mjPrompt },
      { model: 'Flux', icon: 'FL', iconClass: 'flux', desc: t.modelFlux, prompt: fluxPrompt },
      { model: currentLang === 'zh' ? '视频生成' : 'Video', icon: 'VI', iconClass: 'video', desc: t.modelVideo, prompt: videoPrompt }
    ]);

    /* 恢复按钮状态 */
    btn.disabled = false;
    btnText.textContent = t.regenBtn;
    showToast(t.toastSuccess, 'success');
  }, 800);
}

/* ==================== 渲染结果卡片 ==================== */
function renderResults(cards) {
  const grid = document.getElementById('resultsGrid');
  const count = document.getElementById('resultsCount');
  const t = LOCALES[currentLang];

  /* 更新计数文字 */
  count.textContent = t.resultsCount.replace('{n}', cards.length);

  /* 生成卡片 HTML */
  grid.innerHTML = cards.map((card, i) => `
    <div class="prompt-card" style="animation-delay:${i * 0.1}s">
      <div class="card-header">
        <div class="card-model">
          <div class="card-model-icon ${card.iconClass}">${card.icon}</div>
          <div>
            <div class="card-model-name">${card.model}</div>
            <div class="card-model-desc">${card.desc}</div>
          </div>
        </div>
      </div>
      <div class="card-body">
        <div class="card-prompt" id="prompt-${i}">${card.prompt}</div>
      </div>
      <div class="card-footer">
        <button class="btn-copy" onclick="copyPrompt(${i}, this)">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
            <rect x="9" y="9" width="13" height="13" rx="2" stroke="currentColor" stroke-width="2"/>
            <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1" stroke="currentColor" stroke-width="2"/>
          </svg>
          ${t.copyBtn}
        </button>
      </div>
    </div>
  `).join('');
}

/* ==================== 复制功能 ==================== */
async function copyPrompt(index, btn) {
  const text = document.getElementById('prompt-' + index).textContent;
  const t = LOCALES[currentLang];

  try {
    /* 优先使用 Clipboard API */
    await navigator.clipboard.writeText(text);
    btn.classList.add('copied');
    btn.innerHTML = `
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
        <polyline points="20,6 9,17 4,12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      ${t.copiedBtn}
    `;
    showToast(t.toastCopied, 'success');

    /* 2秒后恢复按钮状态 */
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.innerHTML = `
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
          <rect x="9" y="9" width="13" height="13" rx="2" stroke="currentColor" stroke-width="2"/>
          <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1" stroke="currentColor" stroke-width="2"/>
        </svg>
        ${t.copyBtn}
      `;
    }, 2000);
  } catch (err) {
    /* 降级方案：使用 textarea + execCommand */
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast(t.toastCopied, 'success');
  }
}

/* ==================== Toast 提示 ==================== */
function showToast(msg, type) {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = 'toast';

  /* 警告类型使用黄色样式 */
  if (type === 'warning') {
    toast.style.background = 'rgba(234,179,8,0.15)';
    toast.style.borderColor = 'rgba(234,179,8,0.3)';
    toast.style.color = '#eab308';
  }

  toast.textContent = msg;
  container.appendChild(toast);

  /* 2.5秒后自动移除 */
  setTimeout(() => toast.remove(), 2500);
}

/* ==================== 键盘快捷键：Ctrl+Enter 生成 ==================== */
document.getElementById('description').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
    e.preventDefault();
    generatePrompts();
  }
});

/* ==================== 初始化：应用语言和主题 ==================== */
applyLocale();
applyTheme();
