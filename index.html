<style>
  /* ==================== CSS Variables - Dark Theme (Default) ==================== */
  :root {
    --bg-primary: #0a0a0f;
    --bg-secondary: rgba(255,255,255,0.04);
    --bg-card: rgba(255,255,255,0.06);
    --bg-card-hover: rgba(255,255,255,0.09);
    --bg-nav: rgba(10,10,15,0.7);
    --border-color: rgba(255,255,255,0.08);
    --border-active: rgba(99,102,241,0.5);
    --text-primary: rgba(255,255,255,0.95);
    --text-secondary: rgba(255,255,255,0.55);
    --text-tertiary: rgba(255,255,255,0.35);
    --text-gradient-from: #fff;
    --text-gradient-to: rgba(255,255,255,0.7);
    --accent-1: #6366f1;
    --accent-2: #a855f7;
    --accent-gradient: linear-gradient(135deg, #6366f1, #a855f7);
    --accent-glow: rgba(99,102,241,0.4);
    --radius-sm: 12px;
    --radius-md: 16px;
    --radius-lg: 24px;
    --radius-xl: 32px;
    --shadow-card: 0 4px 24px rgba(0,0,0,0.3);
    --shadow-glow: 0 0 40px rgba(99,102,241,0.15);
    --font-stack: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', 'PingFang SC', 'Noto Sans CJK SC', sans-serif;
    --transition-fast: 0.2s cubic-bezier(0.4,0,0.2,1);
    --transition-medium: 0.4s cubic-bezier(0.4,0,0.2,1);
    --transition-slow: 0.6s cubic-bezier(0.4,0,0.2,1);
    --select-bg: #1a1a2e;
    --select-arrow: rgba(255,255,255,0.4);
    --input-bg: rgba(255,255,255,0.04);
    --input-focus-bg: rgba(255,255,255,0.06);
    --copy-bg: rgba(255,255,255,0.06);
    --copy-hover-bg: rgba(255,255,255,0.1);
    --copy-border: rgba(255,255,255,0.15);
    --orb-opacity: 0.12;
    --grid-line: rgba(255,255,255,0.02);
    --star-btn-bg: rgba(255,255,255,0.06);
    --star-btn-hover: rgba(255,255,255,0.12);
  }

  /* ==================== CSS Variables - Light Theme ==================== */
  [data-theme="light"] {
    --bg-primary: #f5f5f7;
    --bg-secondary: rgba(0,0,0,0.03);
    --bg-card: rgba(255,255,255,0.8);
    --bg-card-hover: rgba(255,255,255,0.95);
    --bg-nav: rgba(245,245,247,0.75);
    --border-color: rgba(0,0,0,0.08);
    --border-active: rgba(99,102,241,0.4);
    --text-primary: rgba(0,0,0,0.88);
    --text-secondary: rgba(0,0,0,0.55);
    --text-tertiary: rgba(0,0,0,0.35);
    --text-gradient-from: #1a1a1a;
    --text-gradient-to: rgba(0,0,0,0.6);
    --shadow-card: 0 4px 24px rgba(0,0,0,0.08);
    --shadow-glow: 0 0 40px rgba(99,102,241,0.08);
    --select-bg: #fff;
    --select-arrow: rgba(0,0,0,0.4);
    --input-bg: rgba(0,0,0,0.03);
    --input-focus-bg: rgba(0,0,0,0.05);
    --copy-bg: rgba(0,0,0,0.04);
    --copy-hover-bg: rgba(0,0,0,0.08);
    --copy-border: rgba(0,0,0,0.12);
    --orb-opacity: 0.06;
    --grid-line: rgba(0,0,0,0.03);
    --star-btn-bg: rgba(0,0,0,0.04);
    --star-btn-hover: rgba(0,0,0,0.08);

  /* ==================== Reset & Base ==================== */
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
  body {
    font-family: var(--font-stack);
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
    line-height: 1.6;
    transition: background var(--transition-medium), color var(--transition-medium);
  }

  /* ==================== Background Effects ==================== */
  .bg-effects { position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
  .bg-orb {
    position:absolute; border-radius:50%; filter:blur(120px); opacity:var(--orb-opacity);
    animation: orbFloat 20s ease-in-out infinite alternate;
    transition: opacity var(--transition-medium);
  }
  .bg-orb-1 { width:600px; height:600px; background:#6366f1; top:-200px; left:-100px; }
  .bg-orb-2 { width:500px; height:500px; background:#a855f7; bottom:-150px; right:-100px; animation-delay:-10s; }
  .bg-orb-3 { width:300px; height:300px; background:#06b6d4; top:50%; left:50%; transform:translate(-50%,-50%); animation-delay:-5s; }
  .bg-grid {
    position:absolute; inset:0;
    background-image:
      linear-gradient(var(--grid-line) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
    background-size: 60px 60px;
  }
  @keyframes orbFloat {
    0% { transform:translate(0,0) scale(1); }
    50% { transform:translate(50px,-30px) scale(1.1); }
    100% { transform:translate(-30px,50px) scale(0.95); }
  }

  /* ==================== Layout ==================== */
  .container { position:relative; z-index:1; max-width:1200px; margin:0 auto; padding:0 24px; }

  /* ==================== Navigation ==================== */
  nav {
    position:sticky; top:0; z-index:100;
    background:var(--bg-nav);
    backdrop-filter:saturate(180%) blur(20px);
    -webkit-backdrop-filter:saturate(180%) blur(20px);
    border-bottom:1px solid var(--border-color);
    transition: background var(--transition-medium), border-color var(--transition-medium);
  }
  .nav-inner {
    display:flex; align-items:center; justify-content:space-between;
    max-width:1200px; margin:0 auto; padding:12px 24px;
  }
  .nav-left { display:flex; align-items:center; gap:12px; }
  .nav-brand {
    display:flex; align-items:center; gap:10px;
    font-size:17px; font-weight:600; letter-spacing:-0.02em;
    background:var(--accent-gradient); -webkit-background-clip:text;
    -webkit-text-fill-color:transparent; background-clip:text;
    text-decoration:none;
  }

  /* 导航右侧操作按钮组 */
  .nav-actions { display:flex; align-items:center; gap:8px; }
  .nav-btn {
    display:flex; align-items:center; justify-content:center;
    width:40px; height:40px;
    background:var(--bg-card); border:1px solid var(--border-color);
    border-radius:var(--radius-sm); color:var(--text-secondary);
    cursor:pointer; transition:all var(--transition-fast);
    font-size:14px; font-weight:600; font-family:var(--font-stack);
  }
  .nav-btn:hover {
    background:var(--bg-card-hover); color:var(--text-primary);
    border-color:var(--border-active);
  }

  /* GitHub Star 按钮 */
  .btn-star {
    display:flex; align-items:center; gap:6px;
    padding:8px 16px; height:40px;
    background:var(--star-btn-bg); border:1px solid var(--border-color);
    border-radius:var(--radius-sm); color:var(--text-secondary);
    font-family:var(--font-stack); font-size:13px; font-weight:500;
    cursor:pointer; transition:all var(--transition-fast);
    text-decoration:none; white-space:nowrap;
  }
  .btn-star:hover {
    background:var(--star-btn-hover); color:var(--text-primary);
    border-color:var(--border-active);
  }
  .btn-star svg { flex-shrink:0; }
  .star-count { font-weight:600; }

  /* ==================== Hero Section ==================== */
  .hero {
    text-align:center; padding:64px 24px 40px;
    animation:fadeUp 0.8s ease-out both;
  }

  /* Hero Logo */
  .hero-logo {
    width:80px; height:80px; margin:0 auto 28px;
    animation:logoIn 1s ease-out both;
  }
  @keyframes logoIn {
    from { opacity:0; transform:scale(0.7) rotate(-10deg); }
    to { opacity:1; transform:scale(1) rotate(0); }
  }

  .hero-badge {
    display:inline-flex; align-items:center; gap:6px;
    padding:6px 16px; border-radius:100px;
    background:rgba(99,102,241,0.1); border:1px solid rgba(99,102,241,0.2);
    font-size:13px; color:var(--accent-1); margin-bottom:24px;
  }
  .hero-badge-dot {
    width:6px; height:6px; border-radius:50%; background:var(--accent-1);
    animation:pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }

  .hero h1 {
    font-size:clamp(32px,6vw,60px); font-weight:700; letter-spacing:-0.03em;
    line-height:1.1; margin-bottom:16px;
    background:linear-gradient(135deg, var(--text-gradient-from) 0%, var(--text-gradient-to) 100%);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  }
  .hero-sub {
    font-size:clamp(15px,2vw,19px); color:var(--text-secondary);
    max-width:580px; margin:0 auto 28px; line-height:1.6;
  }

  /* Hero 特性标签 */
  .hero-features {
    display:flex; flex-wrap:wrap; justify-content:center; gap:8px;
    margin-bottom:32px;
  }
  .hero-feature-tag {
    display:inline-flex; align-items:center; gap:5px;
    padding:6px 14px; border-radius:100px;
    background:var(--bg-card); border:1px solid var(--border-color);
    font-size:12px; color:var(--text-secondary); white-space:nowrap;
  }
  .hero-feature-tag svg { flex-shrink:0; opacity:0.6; }

  /* Hero CTA 按钮 */
  .hero-cta {
    display:flex; align-items:center; justify-content:center; gap:12px;
    flex-wrap:wrap;
  }
  .btn-cta-primary {
    display:inline-flex; align-items:center; gap:8px;
    padding:14px 28px; border:none; border-radius:var(--radius-md);
    background:var(--accent-gradient); color:#fff;
    font-family:var(--font-stack); font-size:15px; font-weight:600;
    cursor:pointer; transition:all var(--transition-fast);
    box-shadow:0 4px 20px rgba(99,102,241,0.3);
    text-decoration:none;
  }
  .btn-cta-primary:hover {
    transform:translateY(-2px); box-shadow:0 8px 30px rgba(99,102,241,0.4);
  }
  .btn-cta-secondary {
    display:inline-flex; align-items:center; gap:8px;
    padding:14px 28px; border:1px solid var(--border-color); border-radius:var(--radius-md);
    background:var(--bg-card); color:var(--text-primary);
    font-family:var(--font-stack); font-size:15px; font-weight:500;
    cursor:pointer; transition:all var(--transition-fast);
    text-decoration:none;
  }
  .btn-cta-secondary:hover {
    background:var(--bg-card-hover); border-color:var(--border-active);
    transform:translateY(-2px);
  }

  /* ==================== Input Section ==================== */
  .input-section {
    animation:fadeUp 0.8s ease-out 0.2s both; margin-bottom:48px;
  }
  .input-card {
    background:var(--bg-card); border:1px solid var(--border-color);
    border-radius:var(--radius-lg); padding:32px;
    backdrop-filter:blur(20px); box-shadow:var(--shadow-card);
    transition:border-color var(--transition-fast), box-shadow var(--transition-fast), background var(--transition-medium);
  }
  .input-card:focus-within {
    border-color:var(--border-active);
    box-shadow:var(--shadow-card), var(--shadow-glow);
  }
  .input-label {
    display:block; font-size:14px; font-weight:500;
    color:var(--text-secondary); margin-bottom:12px; letter-spacing:0.02em;
  }
  .input-textarea {
    width:100%; min-height:140px; padding:16px;
    background:var(--input-bg); border:1px solid transparent;
    border-radius:var(--radius-md); color:var(--text-primary);
    font-family:var(--font-stack); font-size:16px; line-height:1.6;
    resize:vertical; transition:all var(--transition-fast); outline:none;
  }
  .input-textarea::placeholder { color:var(--text-tertiary); }
  .input-textarea:focus { background:var(--input-focus-bg); border-color:var(--border-active); }

  /* ==================== Controls ==================== */
  .controls {
    display:grid; grid-template-columns:repeat(auto-fit, minmax(200px, 1fr));
    gap:16px; margin-top:24px;
  }
  .control-group label {
    display:block; font-size:13px; color:var(--text-secondary);
    margin-bottom:8px; font-weight:500;
  }
  .control-select {
    width:100%; padding:12px 16px; background:var(--input-bg);
    border:1px solid var(--border-color); border-radius:var(--radius-sm);
    color:var(--text-primary); font-family:var(--font-stack); font-size:16px;
    outline:none; cursor:pointer; appearance:none; -webkit-appearance:none;
    background-image:url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1.5L6 6.5L11 1.5' stroke='rgba(255,255,255,0.4)' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
    background-repeat:no-repeat; background-position:right 16px center;
    transition:all var(--transition-fast); min-height:44px;
  }
  .control-select:focus { border-color:var(--border-active); background-color:var(--input-focus-bg); }
  .control-select option { background:var(--select-bg); color:var(--text-primary); }

  /* ==================== Generate Button ==================== */
  .btn-generate {
    display:flex; align-items:center; justify-content:center; gap:10px;
    width:100%; margin-top:24px; padding:16px 32px;
    background:var(--accent-gradient); border:none; border-radius:var(--radius-md);
    color:#fff; font-family:var(--font-stack); font-size:16px; font-weight:600;
    cursor:pointer; position:relative; overflow:hidden;
    transition:all var(--transition-fast);
    box-shadow:0 4px 20px rgba(99,102,241,0.3); min-height:44px;
  }
  .btn-generate:hover { transform:translateY(-2px); box-shadow:0 8px 30px rgba(99,102,241,0.4); }
  .btn-generate:active { transform:translateY(0); }
  .btn-generate:disabled { opacity:0.5; cursor:not-allowed; transform:none; }
  .btn-generate .btn-shimmer {
    position:absolute; inset:0;
    background:linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
    transform:translateX(-100%); transition:transform 0.6s;
  }
  .btn-generate:hover .btn-shimmer { transform:translateX(100%); }

  /* ==================== Results Section ==================== */
  .results-section { padding-bottom:80px; animation:fadeUp 0.8s ease-out 0.4s both; }
  .results-header {
    display:flex; align-items:center; justify-content:space-between; margin-bottom:24px;
  }
  .results-title { font-size:20px; font-weight:600; letter-spacing:-0.01em; }
  .results-count {
    font-size:13px; color:var(--text-tertiary);
    padding:4px 12px; border-radius:100px; background:var(--bg-secondary);
  }
  .results-grid {
    display:grid; grid-template-columns:repeat(auto-fit, minmax(340px, 1fr)); gap:20px;
  }

  /* ==================== Prompt Card ==================== */
  .prompt-card {
    background:var(--bg-card); border:1px solid var(--border-color);
    border-radius:var(--radius-lg); overflow:hidden;
    transition:all var(--transition-medium); animation:cardIn 0.5s ease-out both;
  }
  .prompt-card:nth-child(1) { animation-delay:0.05s; }
  .prompt-card:nth-child(2) { animation-delay:0.15s; }
  .prompt-card:nth-child(3) { animation-delay:0.25s; }
  .prompt-card:nth-child(4) { animation-delay:0.35s; }
  .prompt-card:hover {
    background:var(--bg-card-hover); border-color:rgba(99,102,241,0.15);
    transform:translateY(-4px); box-shadow:var(--shadow-card);
  }
  .card-header {
    display:flex; align-items:center; justify-content:space-between;
    padding:20px 24px 16px; border-bottom:1px solid var(--border-color);
  }
  .card-model { display:flex; align-items:center; gap:10px; }
  .card-model-icon {
    width:36px; height:36px; border-radius:10px;
    display:flex; align-items:center; justify-content:center;
    font-size:16px; font-weight:700; color:#fff;
  }
  .card-model-icon.mj { background:linear-gradient(135deg, #5865f2, #4752c4); }
  .card-model-icon.flux { background:linear-gradient(135deg, #f97316, #ea580c); }
  .card-model-icon.video { background:linear-gradient(135deg, #ec4899, #db2777); }
  .card-model-icon.universal { background:linear-gradient(135deg, #10b981, #059669); }
  .card-model-name { font-size:15px; font-weight:600; }
  .card-model-desc { font-size:12px; color:var(--text-tertiary); }
  .card-body { padding:20px 24px; }
  .card-prompt {
    font-size:14px; line-height:1.7; color:var(--text-secondary);
    word-break:break-word; white-space:pre-wrap; min-height:100px;
  }
  .card-footer {
    display:flex; gap:8px; padding:16px 24px 20px;
    border-top:1px solid var(--border-color);
  }
  .btn-copy {
    display:flex; align-items:center; justify-content:center; gap:6px;
    flex:1; padding:10px 16px; background:var(--copy-bg);
    border:1px solid var(--border-color); border-radius:var(--radius-sm);
    color:var(--text-secondary); font-family:var(--font-stack);
    font-size:13px; font-weight:500; cursor:pointer;
    transition:all var(--transition-fast); min-height:44px;
  }
  .btn-copy:hover { background:var(--copy-hover-bg); color:var(--text-primary); border-color:var(--copy-border); }
  .btn-copy.copied { background:rgba(34,197,94,0.15); border-color:rgba(34,197,94,0.3); color:#22c55e; }

  /* ==================== Empty State ==================== */
  .empty-state { text-align:center; padding:80px 24px; color:var(--text-tertiary); }
  .empty-icon { width:64px; height:64px; margin:0 auto 16px; opacity:0.3; }
  .empty-state p { font-size:15px; }

  /* ==================== Toast ==================== */
  .toast-container { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); z-index:1000; }
  .toast {
    padding:12px 24px; border-radius:100px;
    background:rgba(34,197,94,0.15); border:1px solid rgba(34,197,94,0.3);
    color:#22c55e; font-size:14px; font-weight:500;
    backdrop-filter:blur(10px);
    animation:toastIn 0.3s ease-out, toastOut 0.3s ease-in 2s forwards;
    white-space:nowrap;
  }

  /* ==================== Animations ==================== */
  @keyframes fadeUp { from{opacity:0;transform:translateY(20px);} to{opacity:1;transform:translateY(0);} }
  @keyframes cardIn { from{opacity:0;transform:translateY(30px) scale(0.95);} to{opacity:1;transform:translateY(0) scale(1);} }
  @keyframes toastIn { from{opacity:0;transform:translateY(10px);} to{opacity:1;transform:translateY(0);} }
  @keyframes toastOut { from{opacity:1;} to{opacity:0;transform:translateY(-10px);} }
  @keyframes spin { to{transform:rotate(360deg);} }
  .spinner {
    width:18px; height:18px; border:2px solid rgba(255,255,255,0.2);
    border-top-color:#fff; border-radius:50%; animation:spin 0.6s linear infinite;
  }

  /* ==================== Tab Navigation ==================== */
  .tab-nav {
    display:flex; gap:4px; margin-bottom:32px;
    background:var(--bg-card); border-radius:var(--radius-md);
    padding:4px; border:1px solid var(--border-color);
  }
  .tab-btn {
    flex:1; padding:12px 16px; border:none; border-radius:var(--radius-sm);
    background:transparent; color:var(--text-secondary);
    font-family:var(--font-stack); font-size:14px; font-weight:500;
    cursor:pointer; transition:all var(--transition-fast); min-height:44px;
  }
  .tab-btn:hover { color:var(--text-primary); }
  .tab-btn.active {
    background:var(--accent-gradient); color:#fff;
    box-shadow:0 2px 12px rgba(99,102,241,0.3);
  }

  /* ==================== Optimizer Section ==================== */
  .optimizer-section { margin-bottom:48px; }
  .optimizer-input-row {
    display:flex; gap:12px; margin-bottom:20px;
  }
  .optimizer-input-row .input-textarea {
    min-height:80px;
  }
  .optimizer-actions {
    display:flex; gap:8px; flex-shrink:0; flex-direction:column;
  }
  .btn-optimize {
    display:flex; align-items:center; justify-content:center; gap:8px;
    padding:12px 20px; height:44px; white-space:nowrap;
    background:var(--accent-gradient); border:none; border-radius:var(--radius-sm);
    color:#fff; font-family:var(--font-stack); font-size:14px; font-weight:600;
    cursor:pointer; transition:all var(--transition-fast);
    box-shadow:0 4px 16px rgba(99,102,241,0.25);
  }
  .btn-optimize:hover { transform:translateY(-1px); box-shadow:0 6px 24px rgba(99,102,241,0.35); }
  .btn-optimize:disabled { opacity:0.5; cursor:not-allowed; transform:none; }
  .btn-clear-history {
    display:flex; align-items:center; justify-content:center; gap:6px;
    padding:12px 16px; height:44px;
    background:var(--copy-bg); border:1px solid var(--border-color);
    border-radius:var(--radius-sm); color:var(--text-secondary);
    font-family:var(--font-stack); font-size:13px; font-weight:500;
    cursor:pointer; transition:all var(--transition-fast);
  }
  .btn-clear-history:hover { background:var(--copy-hover-bg); color:var(--text-primary); }

  /* Optimizer 结果对比 */
  .opt-compare {
    display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:20px;
  }
  .opt-box {
    background:var(--input-bg); border:1px solid var(--border-color);
    border-radius:var(--radius-md); padding:16px;
  }
  .opt-box-label {
    font-size:12px; font-weight:600; color:var(--text-tertiary);
    text-transform:uppercase; letter-spacing:0.05em; margin-bottom:8px;
  }
  .opt-box-text {
    font-size:14px; line-height:1.7; color:var(--text-secondary);
    word-break:break-word; white-space:pre-wrap;
  }
  .opt-box-text.original { color:var(--text-tertiary); }

  /* Optimizer 模型结果 */
  .opt-results-grid {
    display:grid; grid-template-columns:repeat(auto-fit, minmax(280px, 1fr)); gap:16px;
  }
  .opt-result-card {
    background:var(--bg-card); border:1px solid var(--border-color);
    border-radius:var(--radius-md); padding:16px;

  .opt-result-model {
    display:flex; align-items:center; gap:8px;
  }

  .opt-result-model-icon.mj { background:linear-gradient(135deg, #5865f2, #4752c4); }
  .opt-result-model-icon.flux { background:linear-gradient(135deg, #f97316, #ea580c); }
  .opt-result-model-icon.video { background:linear-gradient(135deg, #ec4899, #db2777); }
  .opt-result-name { font-size:13px; font-weight:600; }
  .opt-result-text {
    font-size:13px; line-height:1.7; color:var(--text-secondary);
    word-break:break-word; white-space:pre-wrap; margin-bottom:12px;
  }
  .btn-copy-sm {
    display:flex; align-items:center; gap:4px;
    padding:6px 12px; background:var(--copy-bg);
    border:1px solid var(--border-color); border-radius:8px;
    color:var(--text-secondary); font-family:var(--font-stack);
    font-size:12px; font-weight:500; cursor:pointer;
    transition:all var(--transition-fast);
  }
  .btn-copy-sm:hover { background:var(--copy-hover-bg); color:var(--text-primary); }
  .btn-copy-sm.copied { background:rgba(34,197,94,0.15); border-color:rgba(34,197,94,0.3); color:#22c55e; }

  /* 历史记录 */
  .history-section { margin-top:24px; }
  .history-title {
    font-size:14px; font-weight:600; color:var(--text-secondary); margin-bottom:12px;
    display:flex; align-items:center; gap:6px;

  .history-list { display:flex; flex-direction:column; gap:8px; }

  }

  .history-item-input {
    font-size:13px; color:var(--text-secondary); flex:1;

  }

  /* ==================== Responsive ==================== */
  @media (max-width:768px) {
    .hero { padding:40px 16px 28px; }
    .hero-logo { width:60px; height:60px; margin-bottom:20px; }

    .results-grid { grid-template-columns:1fr; }
    .card-body { padding:16px 20px; }

    .card-footer { padding:12px 20px 16px; }

    .optimizer-input-row { flex-direction:column; }
    .optimizer-actions { flex-direction:row; }
    .btn-optimize, .btn-clear-history { flex:1; }
  }
  @media (max-width:480px) {
    .controls { grid-template-columns:1fr; }

    .hero-sub { font-size:14px; }

/* ==================== 语言检测与状态管理 ==================== */
let currentLang = localStorage.getItem('tsc-lang') || (navigator.language.startsWith('zh') ? 'zh' : 'en');
let currentTheme = localStorage.getItem('tsc-theme') || 'dark';

/* ==================== 语言切换 ==================== */
function toggleLang() {
  currentLang = currentLang === 'zh' ? 'en' : 'zh';
  localStorage.setItem('tsc-lang', currentLang);
  applyLocale();
}

/* 应用当前语言到页面 */
function applyLocale() {
  const t = LOCALES[currentLang];
  document.documentElement.lang = currentLang === 'zh' ? 'zh-CN' : 'en';
  document.getElementById('langBtn').textContent = t.langBtn;

  /* 更新 data-i18n 文本 */
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (t[key] !== undefined) el.textContent = t[key];
  });

  /* 更新 data-i18n-html */
  document.querySelectorAll('[data-i18n-html]').forEach(el => {
    const key = el.getAttribute('data-i18n-html');
    if (t[key] !== undefined) el.innerHTML = t[key];
  });

  /* 更新 CTA 按钮（含 SVG 图标） */
  const ctaStart = document.querySelector('.btn-cta-primary');
  const ctaGithub = document.querySelector('.btn-cta-secondary');
  if (ctaStart) ctaStart.innerHTML = t.ctaStart;
  if (ctaGithub) ctaGithub.innerHTML = t.ctaGithub;

  /* 更新 placeholder */
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
    const key = el.getAttribute('data-i18n-placeholder');
    if (t[key] !== undefined) el.placeholder = t[key];
  });

  /* 更新 select 选项 */
  populateSelect('aspectRatio', t.aspectOptions, '16:9');
  populateSelect('style', t.styleOptions, '写实摄影');
  populateSelect('quality', t.qualityOptions, '2');
  populateSelect('stylize', t.stylizeOptions, '250');
}

function populateSelect(id, options, defaultVal) {
  const sel = document.getElementById(id);
  const currentVal = sel.value || defaultVal;
  sel.innerHTML = options.map(o =>
    `<option value="${o.value}"${o.value === currentVal ? ' selected' : ''}>${o.text}</option>`
  ).join('');
}

/* ==================== 主题切换 ==================== */
function toggleTheme() {
  currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
  localStorage.setItem('tsc-theme', currentTheme);
  applyTheme();
}

function applyTheme() {
  document.documentElement.setAttribute('data-theme', currentTheme);
  const icon = document.getElementById('themeIcon');
  if (currentTheme === 'dark') {
    icon.innerHTML = '<circle cx="12" cy="12" r="5" stroke="currentColor" stroke-width="2"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>';
  } else {
    icon.innerHTML = '<path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>';
  }
}

/* ==================== Prompt 生成函数 ==================== */
function generateMidjourneyPrompt(desc,style,aspect,quality,stylize) {
  const s=STYLE_MAP[style]||STYLE_MAP['写实摄影']; const q=QUALITY_MAP[quality];
  let p=desc; if(q) p=q+', '+p; p+=', '+s.mj; p+=' --v 6.0 --ar '+aspect+' --q 2 --style raw --s '+stylize; return p;
}
function generateFluxPrompt(desc,style) {
  const s=STYLE_MAP[style]||STYLE_MAP['写实摄影'];
  return desc+', '+s.flux+', ultra detailed, professional quality, sharp focus, cinematic composition';
}
function generateVideoPrompt(desc,style) {
  const s=STYLE_MAP[style]||STYLE_MAP['写实摄影'];
  return desc+', '+s.video+', smooth cinematic motion, dynamic camera movement, 4K quality, professional lighting, film grain, slow motion';
}
function generateUniversalPrompt(desc,style) {
  const s=STYLE_MAP[style]||STYLE_MAP['写实摄影'];
  return desc+', '+s.universal+', high quality, best quality, masterpiece, ultra detailed, professional composition, cinematic lighting';
}

/* ==================== 核心逻辑 ==================== */
function generatePrompts() {
  const desc=document.getElementById('description').value.trim(); const t=LOCALES[currentLang];
  if(!desc){document.getElementById('description').focus();showToast(t.toastEmpty,'warning');return;}
  const style=document.getElementById('style').value,aspect=document.getElementById('aspectRatio').value,
    quality=document.getElementById('quality').value,stylize=document.getElementById('stylize').value,
    btn=document.getElementById('generateBtn'),btnText=document.getElementById('btnText');
  btn.disabled=true; btnText.innerHTML=t.generating;
  setTimeout(()=>{
    renderResults([
      {model:currentLang==='zh'?'通用模型':'Universal',icon:'ALL',iconClass:'universal',desc:t.modelUniversal,prompt:generateUniversalPrompt(desc,style)},
      {model:'Midjourney',icon:'MJ',iconClass:'mj',desc:t.modelMj,prompt:generateMidjourneyPrompt(desc,style,aspect,quality,stylize)},
      {model:'Flux',icon:'FL',iconClass:'flux',desc:t.modelFlux,prompt:generateFluxPrompt(desc,style)},
      {model:currentLang==='zh'?'视频生成':'Video',icon:'VI',iconClass:'video',desc:t.modelVideo,prompt:generateVideoPrompt(desc,style)}
    ]);
    btn.disabled=false; btnText.textContent=t.regenBtn; showToast(t.toastSuccess,'success');
  },800);
}

function renderResults(cards) {
  const grid=document.getElementById('resultsGrid'),count=document.getElementById('resultsCount'),t=LOCALES[currentLang];
  count.textContent=t.resultsCount.replace('{n}',cards.length);
  grid.innerHTML=cards.map((c,i)=>`
    <div class="prompt-card" style="animation-delay:${i*0.1}s">
      <div class="card-header"><div class="card-model">
        <div class="card-model-icon ${c.iconClass}">${c.icon}</div>
        <div><div class="card-model-name">${c.model}</div><div class="card-model-desc">${c.desc}</div></div>
      </div></div>
      <div class="card-body"><div class="card-prompt" id="prompt-${i}">${c.prompt}</div></div>
      <div class="card-footer"><button class="btn-copy" onclick="copyPrompt(${i},this)">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><rect x="9" y="9" width="13" height="13" rx="2" stroke="currentColor" stroke-width="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1" stroke="currentColor" stroke-width="2"/></svg>
        ${t.copyBtn}
      </button></div>
    </div>`).join('');
}

async function copyPrompt(index,btn) {
  const text=document.getElementById('prompt-'+index).textContent,t=LOCALES[currentLang];
  try {
    await navigator.clipboard.writeText(text);
    btn.classList.add('copied');
    btn.innerHTML=`<svg width="14" height="14" viewBox="0 0 24 24" fill="none"><polyline points="20,6 9,17 4,12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg> ${t.copiedBtn}`;
    showToast(t.toastCopied,'success');
    setTimeout(()=>{btn.classList.remove('copied');btn.innerHTML=`<svg width="14" height="14" viewBox="0 0 24 24" fill="none"><rect x="9" y="9" width="13" height="13" rx="2" stroke="currentColor" stroke-width="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1" stroke="currentColor" stroke-width="2"/></svg> ${t.copyBtn}`;},2000);
  } catch(err) {
    const ta=document.createElement('textarea');ta.value=text;ta.style.position='fixed';ta.style.opacity='0';
    document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);
    showToast(t.toastCopied,'success');
  }
}

function showToast(msg,type) {
  const c=document.getElementById('toastContainer'),t=document.createElement('div');t.className='toast';
  if(type==='warning'){t.style.background='rgba(234,179,8,0.15)';t.style.borderColor='rgba(234,179,8,0.3)';t.style.color='#eab308';}
  t.textContent=msg;c.appendChild(t);setTimeout(()=>t.remove(),2500);
}

});

/* ==================== Tab 切换 ==================== */
function switchTab(tab) {
  const genSection = document.getElementById('inputSection');
  const resSection = document.getElementById('resultsSection');
  const optSection = document.getElementById('optimizerSection');
  const tabGen = document.getElementById('tabGenerator');
  const tabOpt = document.getElementById('tabOptimizer');

  if (tab === 'generator') {
    genSection.style.display = ''; resSection.style.display = ''; optSection.style.display = 'none';
    tabGen.classList.add('active'); tabOpt.classList.remove('active');
  } else {
    genSection.style.display = 'none'; resSection.style.display = 'none'; optSection.style.display = '';
    tabGen.classList.remove('active'); tabOpt.classList.add('active');
    renderHistory();
  }
}

/* 优化核心函数：将简单描述扩展为专业 Prompt */
function enhanceDescription(input) {
  let enhanced = input;

  /* 移除常见的中文前缀 */
  enhanced = enhanced.replace(/^(帮我|请|给我|我想|画一个|画一只|画一个|生成|创建|制作|做)(一个|一只|一幅|一张|个|只)?/g, '').trim();

  /* 关键词替换增强 */
  for (const [key, value] of Object.entries(ENHANCE_MAP)) {
    if (enhanced.includes(key)) {
      enhanced = enhanced.replace(key, value);
      break; /* 只替换第一个匹配的关键词 */
    }
  }

  /* 如果没有匹配到任何关键词，添加通用增强 */
  if (enhanced === input.replace(/^(帮我|请|给我|我想|画一个|画一只|画一个|生成|创建|制作|做)(一个|一只|一幅|一张|个|只)?/g, '').trim()) {
    enhanced += ', highly detailed, professional quality, stunning composition, cinematic lighting, masterpiece';
  }

  return enhanced;
}

/* 为不同模型生成优化后的 Prompt */
function optimizeForChatGPT(desc) {
  const e = enhanceDescription(desc);
  return `Create a detailed and vivid description of: ${e}. Include specific details about composition, lighting, color palette, mood, and artistic style. The result should be a comprehensive prompt suitable for high-quality image generation.`;
}

function optimizeForMidjourney(desc) {
  const e = enhanceDescription(desc);
  return `${e}, masterpiece, best quality, ultra detailed, professional photography --v 6.0 --q 2 --style raw --s 500`;
}

function optimizeForFlux(desc) {
  const e = enhanceDescription(desc);
  return `${e}, ultra detailed, professional quality, sharp focus, cinematic composition, 8K resolution`;
}

function optimizeForVideo(desc) {
  const e = enhanceDescription(desc);
  return `${e}, smooth cinematic motion, dynamic camera movement, 4K quality, professional lighting, film grain, slow motion, atmospheric`;
}

/* ==================== 优化器主逻辑 ==================== */
function optimizePrompt() {
  const input = document.getElementById('optInput').value.trim();
  const t = LOCALES[currentLang];

  if (!input) {
    document.getElementById('optInput').focus();
    showToast(t.optToastEmpty, 'warning');
    return;
  }

  const btn = document.getElementById('optBtn');
  const btnText = document.getElementById('optBtnText');
  btn.disabled = true;
  btnText.innerHTML = t.optBtnLoading;

  setTimeout(() => {
    /* 生成增强描述 */
    const enhanced = enhanceDescription(input);

    /* 显示对比区域 */
    document.getElementById('optOriginalText').textContent = input;
    document.getElementById('optEnhancedText').textContent = enhanced;
    document.getElementById('optResults').style.display = '';

    /* 生成各模型结果 */
    const results = [
      { model: t.optChatGPT, icon: 'GPT', iconClass: 'chatgpt', desc: t.optChatGPTDesc, prompt: optimizeForChatGPT(input) },
      { model: t.optMj, icon: 'MJ', iconClass: 'mj', desc: t.optMjDesc, prompt: optimizeForMidjourney(input) },
      { model: t.optFlux, icon: 'FL', iconClass: 'flux', desc: t.optFluxDesc, prompt: optimizeForFlux(input) },
      { model: t.optVideo, icon: 'VI', iconClass: 'video', desc: t.optVideoDesc, prompt: optimizeForVideo(input) }
    ];

    const grid = document.getElementById('optResultsGrid');
    grid.innerHTML = results.map((r, i) => `
      <div class="opt-result-card">
        <div class="opt-result-header">
          <div class="opt-result-model">
            <div class="opt-result-model-icon ${r.iconClass}">${r.icon}</div>
            <div class="opt-result-name">${r.model}</div>
          </div>
          <button class="btn-copy-sm" onclick="copyOptResult(${i}, this)">${t.copyBtn}</button>
        </div>
        <div class="opt-result-text" id="opt-result-${i}">${r.prompt}</div>
      </div>
    `).join('');

    /* 保存到历史记录 */
    saveToHistory(input, enhanced);

    /* 恢复按钮 */
    btn.disabled = false;
    btnText.textContent = t.optBtnText;
    showToast(t.optToastSuccess, 'success');
  }, 600);
}

/* 复制优化结果 */
async function copyOptResult(index, btn) {
  const text = document.getElementById('opt-result-' + index).textContent;
  const t = LOCALES[currentLang];
  try {
    await navigator.clipboard.writeText(text);
    btn.classList.add('copied');
    btn.textContent = t.copiedBtn;
    showToast(t.optToastCopied, 'success');
    setTimeout(() => { btn.classList.remove('copied'); btn.textContent = t.copyBtn; }, 2000);
  } catch (err) {
    const ta = document.createElement('textarea'); ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
    showToast(t.optToastCopied, 'success');
  }
}

/* ==================== 历史记录管理 ==================== */
const HISTORY_KEY = 'tsc-opt-history';
const MAX_HISTORY = 20;

function getHistory() {
  try { return JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]'); } catch { return []; }
}

function saveToHistory(input, enhanced) {
  const history = getHistory();
  history.unshift({ input, enhanced, time: new Date().toISOString() });
  if (history.length > MAX_HISTORY) history.pop();
  localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
  renderHistory();
}

function clearHistory() {
  localStorage.removeItem(HISTORY_KEY);
  renderHistory();
  const t = LOCALES[currentLang];
  showToast(t.optToastHistoryCleared, 'success');
}

function renderHistory() {
  const history = getHistory();
  const section = document.getElementById('historySection');
  const list = document.getElementById('historyList');

  if (history.length === 0) {
    section.style.display = 'none';
    return;
  }

  section.style.display = '';
  list.innerHTML = history.map((h, i) => {
    const date = new Date(h.time);
    const timeStr = date.toLocaleDateString(currentLang === 'zh' ? 'zh-CN' : 'en-US', { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' });
    return `<div class="history-item" onclick="loadHistory(${i})">
      <span class="history-item-input">${h.input}</span>
      <span class="history-item-time">${timeStr}</span>
    </div>`;
  }).join('');
}

function loadHistory(index) {
  const history = getHistory();
  if (history[index]) {
    document.getElementById('optInput').value = history[index].input;
    document.getElementById('optInput').focus();
  }
}

/* Optimizer 键盘快捷键 */
document.getElementById('optInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) { e.preventDefault(); optimizePrompt(); }
});
