  <!-- Spark rays -->
  <line x1="256" y1="148" x2="256" y2="136" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
  <line x1="284" y1="164" x2="294" y2="156" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
  <line x1="228" y1="164" x2="218" y2="156" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
  <!-- TSC text -->
  <text x="256" y="440" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif" font-size="56" font-weight="700" fill="white" letter-spacing="8" opacity="0.9">TSC</text>
